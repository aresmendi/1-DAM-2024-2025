<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="practica de javascript">
  <meta name="keywords" content="javascript">
  <meta name="author" content="Jova Rojas">
  <title>LISTITA</title>

  <script>
    //Esto pa no tener que ponerlo en el body...
    window.addEventListener("load", listita); 
    
    function listita() {
      //Un array que "es recomendable" que sea const, aunque sus valores puedan cambiar
      const fruits = ["Banana", "Orange", "Apple", "Mango"];
      //El largo del array
      let fLen = fruits.length;

      //Variable auxiliar que empieza con la etiqueta de lista no ordenada
      let text = "<ul>";

      //Un buclesito pa que vaya poniendo li y valor
      for (let i = 0; i < fLen; i++) {
        text += "<li>" + fruits[i] + "</li>";
      }

      //Le añadimos el ul de cierre
      text += "</ul>";

      //En el elemento con id demo, metemos la variable text.
      document.getElementById("demo").innerHTML = text;
    }
  </script>
</head>

<body>
  <h1>JavaScript Arrays</h1>
  <h2>Looping an Array</h2>

  <p id="demo"></p>
</body>

</html>
