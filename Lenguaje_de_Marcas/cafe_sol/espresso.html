<!DOCTYPE html>
<html lang=es>
<head>
	<style>
		body {
			background-image:url(imagenes/bg.png);
			font-family: sans-serif;
		}
		div {
			padding: 10px;
			margin: 20px auto;
			width: 100px;
			font-size: 1.5em;
		}
        #panel, #panel td:not(.hueco) {
            margin: 30px auto;
            background-color: #333300;
            border: 1px solid #ffffcc;
            min-width: 120px;
            text-align: center;
            color: #ffffcc;
			position: relative;
        }
		#panel span {
			position: absolute;
			bottom: 15px;
			left: 10px;
			text-shadow:1px 1px #333300;
		}
		#panel tr:nth-child(4) span {
			position: static;
			text-align:center;
		}
		#card {
			margin: 20px auto;
			color: #ffffcc;
			background-color: black;
		}
		#card tr:first-child td:last-child {
			text-align: center;
			font-weight: bold;
		}
		#card tr:nth-child(even) td {
			max-width: 250px;
			font-size: 0.9em;
			font-style: italic;
			padding: 0 10px;
		}
		img {
			height: 200px;
		}
		[type="range"] {
			width: 120px;
		}
		button {
			font-size: 40pt;
			margin: 10px auto;
			background-color: #ffffcc;
		}



    
	</style>
	<script src="js/cafe.js"></script>
</head>
