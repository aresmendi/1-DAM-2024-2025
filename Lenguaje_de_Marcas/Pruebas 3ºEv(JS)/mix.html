        { nombre: "Rodrygo", numero: 11, foto: "https://assets.laliga.com/squad/2024/t186/p440077/2048x2225/p440077_t186_2024_1_001_000.png" },

Cuando haces clic derecho (contextmenu), el evento se dispara en el <td>, por eso td.indice.
Cuando pasas el mouse (mouseenter), el evento se dispara en la <img>, por eso img.indice.*/

            let tablaTarjeta = document.getElementById("card"); //id
            //el tagname anidado, el culpable de nuestro suspenso.
            let columnaNombre = tablaTarjeta.getElementsByTagName("tr")[0].getElementsByTagName("td")[1];
            columnaNombre.textContent = "EDUARDO CAMAVINGA"; //textContent o innerHTML
            //Cosas con style
            columnaNombre.style.fontFamily = "cursive";
            columnaNombre.style.fontSize = "2em";
            columnaNombre.style.color = "blue";

            //crear un boton
            let boton = document.createElement("button");
            let texto = document.createTextNode("CAMBIAR COLOR FONDO"); //texto del boton
            //añadir el texto
            boton.appendChild(texto);
            boton.style.display = "block";
            //añadir el boton a la columna
            columnaNombre.appendChild(boton);
            //Crear un salto de linea
            let saltodeLinea = document.createElement("br");
            //insertar antes..
            columnaNombre.insertBefore(saltodeLinea, boton);

            //cambiar estilo del boton
            boton.style.backgroundColor = "green";
            boton.style.fontSize = "22px";
            boton.style.color = "white";

            //crear un input color
            let inputColor = document.createElement("input");
            columnaNombre.appendChild(inputColor);
            //ponerle su tipo
            inputColor.type = "color";


            boton.addEventListener("click", function () {
                //pilla el color del input con seleccionador de atributo y lo usa para cambiar
                let color = document.querySelector("[type=color]").value;
                columnaNombre.style.backgroundColor = color;
            })

            //columna Descripcion
            let todosLosTd = tablaTarjeta.getElementsByTagName("td");
            console.log(todosLosTd); //sirve para ojear en el navegador
            let todosLosTr = tablaTarjeta.getElementsByTagName("tr");
            let casilla = todosLosTr[todosLosTr.length - 1];

            let descripcion = todosLosTd[todosLosTd.length - 1];
            console.log(casilla);//sirve para ojear en el navegador

            descripcion.innerHTML = "6";

            //construccion del input range
            //crear el elemento
            let inputRange = document.createElement("input");
            inputRange.type = "range"; //asignarle propiedades
            inputRange.value = "30";
            inputRange.min = "0";
            inputRange.max = "60";
            inputRange.step = "1";

            //Le añadi un salto de linea desde js porque si, porque esto es asi de fumao
            descripcion.appendChild(saltodeLinea);
            //luego añado el range como ultimo hijo
            descripcion.appendChild(inputRange);

            inputRange.addEventListener("change", function () {
                let valor = inputRange.value; //pillo el valor del range
                //manera correcta de usar el valor (Añadiendole px como string, lo del *4 es cosa mia)
                descripcion.style.fontSize = valor * 4 + "px";
            })

            descripcion.addEventListener("click", function () {
                //un gradiente por variar.
                descripcion.style.backgroundImage = "linear-gradient(black, blue, black)";
                descripcion.style.color = "white";
            })

            //AL HACER CLICK EN LA IMAGEN GRANDE SE DESTAPA LA TABLA
            imagenGrande.addEventListener("click", function () {
                let tituloh2 = document.getElementsByTagName("h2")[0];
                tituloh2.innerHTML = "JUGADORES REAL MADRID 2025";
                tablaPanel.style.display = "block";
                //PARA LA TABLA CREAMOS ELEMENTOS Y CARGAMOS TODA LA INFO
                //CONDICION MENOR A 9 PORQUE NO SE, PORQUE CREO QUE SE DESPEROLA SI NO. NO LO HE PROBADO.
                //no se desperola, aresmendi tested!
                for (let i = 0; i < tdsDelDocumento.length; i++) {
                    let imagen = document.createElement("img");
                    imagen.src = miArray[i].foto;
                    imagen.style.width = "300px";
                    imagen.style.height = "300px";
                    imagen.indice = i; // para saber de qué jugador se trata
                    imagen.addEventListener("mouseenter", mostrarInfoJugador); //Evento del mouse al entrar, que no es igual que el mouseover
                    //El mouseover tiene bubbling y entonces hace que a los hijos de ese elemento tambien se le aplique el evento
                    //En este caso no tiene relevancia pero antes le habia asociado el evento al td y el mouseover me hacia daño, ademas
                    //la lia mucho para capturar el evento dentro de mostrarInfo. MOUSEENTER ES MAS ESPECIFICO.. 

                    let tituloh3 = document.createElement("h3");
                    tituloh3.innerHTML = miArray[i].nombre;
                    let parrafo = document.createElement("p");
                    parrafo.innerHTML = miArray[i].numero;
                    parrafo.style.fontSize = "2em";
                    parrafo.style.color = "blue";

                    //vacias el td porque si tiene ya una imagen o tiene algo en el html te jodes y se acumula
                    tdsDelDocumento[i].innerHTML = "";
                    tdsDelDocumento[i].appendChild(imagen);
                    tdsDelDocumento[i].appendChild(tituloh3);
                    tdsDelDocumento[i].appendChild(parrafo);
                }
            })

            //Insertar un jugador nuevo
            //primero el boton
            let botonInsertar = document.createElement("button");
            let textoBoton = document.createTextNode("INSERTAR");
            botonInsertar.appendChild(textoBoton);
            botonInsertar.style.fontSize = "25px";

            //recoger el formulario y ponerle el boton
            let form = document.getElementsByName("form1")[0];
            form.appendChild(botonInsertar);

            //EL BOTON POR DEFECTO ES TIPO SUBMIT
            botonInsertar.addEventListener("click", insertarJugador);

            }

            }

        //Queria probar lo del evento, entonces esto lo que hace es evitar que el boton cumpla su funcion de envio
        //que es su funcion default al estar dentro de un form, y hace todas las movidas de despues.
        function insertarJugador(ev) {
            ev.preventDefault();
            let inputsFormulario = document.querySelectorAll("form input");
            //RECOGEMOS LOS DATOS DE LAS CASILLAS
            let nom = inputsFormulario[0].value;
            let num = parseInt(inputsFormulario[1].value);//Lo dejo por si lo necesito pero odio el parse
            let enlace = inputsFormulario[2].value;

            // validar numero
            if (num < 1 || num > 25) {
                inputsFormulario[1].style.backgroundColor = "red";
                inputsFormulario[1].setCustomValidity("El numero debe estar entre 1 y 25");
            } else {
                inputsFormulario[1].setCustomValidity("");
                inputsFormulario[1].style.backgroundColor = "white";

                //lo cargo al array
                miArray.push({ nombre: nom, numero: num, foto: enlace });


                //obtengo el tbody
                let tbody = tablaPanel.getElementsByTagName("tbody")[0];
                //filas
                let filas = tbody.getElementsByTagName("tr");

                let ultimaFila = filas[filas.length - 1];

                //crear un nuevo tr
                let tr;

                //si no existe la ultima fila o si los hijos de la ultima fila son mayores o igual a 3. 
                //PRIMERA VEZ QUE USO CHILDREN T_T PRENDAMOS UNA VELA
                if (!ultimaFila || ultimaFila.children.length >= 3) {
                    tr = document.createElement("tr");
                    tbody.appendChild(tr);
                } else {
                    tr = ultimaFila;
                }

                //ASOCIAR EL MARCAR COMO FAVORITO
                let td = document.createElement("td");
                td.indice = miArray.length - 1;
                td.style.backgroundColor = "lightgrey";
                td.addEventListener("contextmenu", marcarFavorito);

                //ESTO LO HICIMOS ARRIBA PERO CON LOS 9 ORIGINALES, ENTONCES AQUI SE CREA EL NUEVO Y SE LE ASOCIA EL EVENTO
                let imagen = document.createElement("img");
                imagen.src = enlace;
                imagen.style.width = "300px";
                imagen.style.height = "300px";


                let tituloh3 = document.createElement("h3");
                tituloh3.innerHTML = nom;

                let parrafo = document.createElement("p");
                parrafo.innerHTML = num;
                parrafo.style.fontSize = "2em";
                parrafo.style.color = "blue";

                //agregar al td
                td.appendChild(imagen);
                imagen.indice = miArray.length - 1; // para saber de qué jugador se trata
                //ASOCIAR EL EVENTO A LA IMAGEN!!! AQUI TAMBIEN HACE FALTA PORQUE SINO SE ASOCIA SOLO A LOS PRIMEROS 9
                imagen.addEventListener("mouseenter", mostrarInfoJugador);
                td.appendChild(tituloh3);
                td.appendChild(parrafo);

                //añadir a la fila adecuada
                tr.appendChild(td);

                //vaciar los inputs
                for (let j = 0; j < inputsFormulario.length; j++) {
                    inputsFormulario[j].value = "";
                }
            }
        }

        let tdActual;
        function marcarFavorito(e) {
            /*He usado 'this' porque hace referencia al elemento al que se le asignó el evento (el <td>),
    mientras que 'e.target' puede referirse al elemento interno donde se hizo clic (como una imagen o un párrafo),
    lo que provocaría que el fondo se aplicara al hijo en lugar del <td>.
    */
            if (this.style.backgroundColor == "yellow") {
                this.style.backgroundColor = "transparent";
                alert("Has desmarcado a " + miArray[this.indice].nombre + " de favorito");
            } else {
                this.style.backgroundColor = "yellow";
                alert("Has marcado a " + miArray[this.indice].nombre + " como favorito");
            }
        }

        function mostrarInfoJugador(ev) {
            contenedorInfo.style.display = "block";

            //INVESTIGUE CURRENTTARGET y mola pero bueno aprendi a usar el q tenemos que usar... que es e.target
            // let casilla = ev.currentTarget;
            let casilla = ev.target;
            //console.log(casilla);
            let posicion = casilla.indice;

            let jugador = miArray[posicion];

            //ESTO ES PARA LA TARJETA INFORMATIVA Q SOLO SE MUESTRA AL PASAR EL MOUSE
            let imagen = document.createElement("img");
            imagen.src = jugador.foto;
            imagen.style.width = "300px";
            imagen.style.height = "300px";
            tituloInfo.innerHTML = jugador.nombre;
            tdsInfo[0].innerHTML = "";
            tdsInfo[0].appendChild(imagen);
            tdsInfo[1].innerHTML = jugador.numero;
            tdsInfo[1].style.fontSize = "100px";
            tdsInfo[1].style.fontStyle = "italic";
        }
