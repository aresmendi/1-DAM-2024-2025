<!doctype html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<title>Registro</title>
	<meta name="description" content="Practica formulario html y javascript">
	<meta name="keywords" content="javascript, form, datos, registro">
	<meta name="author" content="Jovanna Rojas">
	<script>
		/*He investigado la diferencia entre DOMContentLoaded y load y lo he probado con un video, pero como no hemos visto 
		document.DOMContentLoaded puse window(...)load.
			Entiendo que por el momento no importa que cargue mas lento o espere a cargar las imagenes :)*/
		window.addEventListener("load", function () {
			let form = document.getElementById("registro");
			let password1 = document.getElementById("password1");
			let password2 = document.getElementById("password2");
			let fechaInicio = document.getElementById("fechaInicio");
			let camposObligatorios = form.querySelectorAll("input[required]"); //devuelve una nodeList...
			let conocimientos = document.getElementById("conocimientos");


			// 1. Validar que las contraseñas coincidan y asignar mensaje personalizado
			//Evento input, mientras se escribe
			password1.addEventListener("input", validarContraseñas);
			password2.addEventListener("input", validarContraseñas);

			//Comparo que el input no está vacío para poder escribir primero una o la otra
			function validarContraseñas() {
				if (password1.value !== password2.value && password1.value !== "" && password2.value !== "") {
					password1.setCustomValidity("Las contraseñas deben coincidir");
					password2.setCustomValidity("Las contraseñas deben coincidir");
				} else {
					password2.setCustomValidity("");
					password1.setCustomValidity("");
				}
			}

			// 2. Validar que la fecha sea mayor que la actual
			//Eventos submit, al enviar.
			form.addEventListener("submit", fechaValida);

			function fechaValida(event) {
				let fechaInicioAsDate = fechaInicio.valueAsDate;
				let fechaActual = new Date();

				//Si está vacía o la fecha de inicio es menor o igual a la fecha actual lanza la alerta y evita que se envíe
				if (!fechaInicioAsDate || fechaInicioAsDate <= fechaActual) {
					alert("La fecha de inicio debe ser posterior a hoy.");
					event.preventDefault(); // Evitar que el formulario se envíe
				}
			}

			// 3. Validar campos obligatorios y mostrar imagen valid.png o invalid.png asociado al <form>
			/*uso de nextElementSibling o nextSibling. nextElementSibling devuelve el siguiente elemento hermano ignorando 
			texto y comentarios mientras que nextSibling devuelve el siguiente NODO*/
			form.addEventListener("input", function (event) {
				let campo = event.target;

				if (campo.required) {
					let imagen = campo.nextElementSibling.querySelector("img");

					if (campo.checkValidity()) {
						imagen.src = "img/valid.png";
						imagen.alt = "Campo válido";
					} else {
						imagen.src = "img/invalid.png";
						imagen.alt = "Campo no válido";
					}
				}
			})

				// 4. Validar el campo conocimientos
				conocimientos.addEventListener("input", validarConocimientos);

				function validarConocimientos() {
					if (conocimientos.validity.rangeOverflow ||
						conocimientos.validity.rangeUnderflow ||
						conocimientos.validity.stepMismatch) {
						conocimientos.style.backgroundColor = "red";
					} else {
						conocimientos.style.backgroundColor = "transparent";
					}
				}
			})
	</script>
	<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
	<form id="registro" method="post" action="programa.php">
		<header>
			<img src="img/bg-formtitle-left.png" alt="mano izquierda" id="left_hand">
			<h1>¡Regístrate!</h1>
			<img src="img/bg-formtitle-right.png" alt="mano derecha" id="right_hand">
		</header>
		<ul>
			<li>
				<label for="nombre">Mi nombre es:</label>
				<input type="text" id="nombre" name="nombre" required autofocus><span><img src="img/required.png"
						alt="asterisco campo obligatorio"></span>
			</li>
			<li>
				<label for="email">Mi email es:</label>
				<input type="email" id="email" name="email" required multiple><span><img src="img/required.png"
						alt="asterisco campo obligatorio"></span>
			</li>
			<li>
				<label for="recuerdame">Recuérdame en este equipo</label>
				<input type="checkbox" checked id="recuerdame" name="recuerdame">
			</li>
			<li>
				<label for="url">Mi dirección web es:</label>
				<input type="url" id="url" name="url" placeholder="http://ejemplo.com">
			</li>
			<li>
				<label for="password1">Me gustaría que mi contraseña fuera:</label>
				<p>(al menos 6 caracteres, sin espacios)</p>
				<input type="password" id="password1" name="password1" pattern="^\S{6,}$" required><span><img
						src="img/required.png" alt="asterisco campo obligatorio"></span>
			</li>
			<li>
				<label for="password2">Mi contraseña repetida es:</label>
				<input type="password" id="password2" name="password2" pattern="^\S{6,}$" required><span><img
						src="img/required.png" alt="asterisco campo obligatorio"></span>
			</li>
			<li>
				<label for="conocimientos">En una escala de 1 a 10, mis conocimientos de HTML5 son:</label>
				<input type="number" id="conocimientos" name="conocimientos" min="1"
					max="10"><!--No hace falta poner step para enteros.-->
			</li>
			<li>
				<label for="fechaInicio">Por favor, inicia mi suscripción el día:</label>
				<input type="date" id="fechaInicio" name="fechaInicio" title="dd/mm/aaaa" required><span><img
						src="img/required.png" alt="asterisco campo obligatorio"></span>
			</li>
			<li>
				<label for="cantidad">Me gustaría recibir <input type="number" name="cantidad" id="cantidad" min="0"
						max="5" value="1"> copias de <cite>El manual de HTML5</cite>.</label>
				<!--No hace falta poner step para enteros.-->
			</li>
			<li>
				<label for="tambienCSS3">También regístrame para <cite>El manual de CSS3</cite></label>
				<input id="tambienCSS3" name="tambienCSS3" type="checkbox">
			</li>
			<li>
				<input type="submit" id="registro-submit" value="Envíame">
			</li>
		</ul>
	</form>
</body>
</html>
